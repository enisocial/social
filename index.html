<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Connectez-vous avec vos amis et partagez vos moments - Réseau social moderne et sécurisé" />
    <meta name="theme-color" content="#8B5CF6" />

    <!-- Sécurité CSP -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.supabase.co https://*.vercel-insights.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.supabase.co https://cdn.mcmovement.org.za;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.vercel-insights.com https://cdn.mcmovement.org.za;
      media-src 'self' blob: https://*.supabase.co;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
    ">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://social-app.com" />
    <meta property="og:title" content="Social - Réseau Social" />
    <meta property="og:description" content="Connectez-vous avec vos amis et partagez vos moments" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://social-app.com" />
    <meta property="twitter:title" content="Social - Réseau Social" />
    <meta property="twitter:description" content="Connectez-vous avec vos amis et partagez vos moments" />
    <meta property="twitter:image" content="/og-image.png" />

    <title>Social - Réseau Social</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
